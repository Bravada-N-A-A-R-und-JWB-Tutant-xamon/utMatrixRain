name: Build UT Click Packages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Clickable
        run: |
          python3 -m pip install --upgrade pip
          pip3 install clickable-ut

      - name: Build for ARM64
        run: clickable build --arch arm64

      - name: Build for ARMHF
        run: clickable build --arch armhf

      - name: Build for AMD64
        run: clickable build --arch amd64

      - name: Collect Click Packages
        id: collect_files
        run: |
          mkdir dist
          find . -name "*.click" -exec cp {} dist/ \;
          echo "=== Найденные .click пакеты ==="
          ls -lh dist
          if [ -z "$(ls -A dist)" ]; then
            echo "Ошибка: Ни один .click пакет не был найден!" && exit 1
          fi

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.click
          tag_name: latest
          name: "Latest Build"
          body: "Автоматическая сборка для JWB-Denda."
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
